<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <style>
    .title{font-size:20px;font-weight:700;fill:#222}
    .ax{font-size:13px;fill:#444}
    .sub{font-size:13px;fill:#555}
  </style>
  <rect width="760" height="420" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" class="title">사이클 수명 — "몇 회"는 조건이 정한다</text>

  <!-- axes -->
  <line x1="90" y1="60" x2="90" y2="340" stroke="#333" stroke-width="2"/>
  <line x1="90" y1="340" x2="690" y2="340" stroke="#333" stroke-width="2"/>

  <!-- y labels -->
  <g class="ax" text-anchor="end">
    <line x1="90" y1="80" x2="690" y2="80" stroke="#eee"/>
    <line x1="90" y1="160" x2="690" y2="160" stroke="#eee"/>
    <text x="82" y="85">100%</text>
    <text x="82" y="165">90%</text>
    <text x="82" y="245">80%</text>
    <text x="82" y="325">70%</text>
  </g>
  <text x="36" y="200" text-anchor="middle" class="ax" font-weight="700" transform="rotate(-90 36 200)">용량 유지율</text>

  <!-- x labels -->
  <g class="ax" text-anchor="middle">
    <text x="90" y="362">0</text>
    <text x="240" y="362">250</text>
    <text x="390" y="362">500</text>
    <text x="540" y="362">750</text>
    <text x="690" y="362">1000</text>
  </g>
  <text x="390" y="388" text-anchor="middle" class="ax" font-weight="700">사이클 횟수</text>

  <!-- EOL 80% line -->
  <line x1="90" y1="240" x2="690" y2="240" stroke="#999" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="96" y="234" class="sub" font-size="12" fill="#666">수명 끝(EOL) 기준 = 80%</text>

  <!-- harsh curve (red) -->
  <path d="M 90 80 C 200 95, 300 180, 390 240 C 450 280, 520 312, 580 322"
        fill="none" stroke="#E8645A" stroke-width="3.5"/>
  <!-- gentle curve (green) -->
  <path d="M 90 80 C 260 92, 480 150, 630 240 C 660 262, 680 280, 690 286"
        fill="none" stroke="#7FB069" stroke-width="3.5"/>

  <!-- crossing markers -->
  <line x1="390" y1="240" x2="390" y2="340" stroke="#E8645A" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
  <circle cx="390" cy="240" r="5" fill="#E8645A"/>
  <text x="390" y="226" text-anchor="middle" class="sub" fill="#b5593f" font-size="12">500회</text>

  <line x1="630" y1="240" x2="630" y2="340" stroke="#5a8a3c" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
  <circle cx="630" cy="240" r="5" fill="#7FB069"/>
  <text x="630" y="226" text-anchor="middle" class="sub" fill="#5a8a3c" font-size="12">~900회</text>

  <!-- legend -->
  <g>
    <line x1="200" y1="105" x2="235" y2="105" stroke="#E8645A" stroke-width="3.5"/>
    <text x="242" y="110" class="sub">가혹: 1C · 100% DOD · 25°C</text>
    <line x1="200" y1="129" x2="235" y2="129" stroke="#7FB069" stroke-width="3.5"/>
    <text x="242" y="134" class="sub">완화: 낮은 C · 얕은 DOD</text>
  </g>

  <text x="380" y="408" text-anchor="middle" class="sub" font-size="12">데이터시트의 "500회"는 가혹 조건 기준. 얕게·천천히·적정 온도로 쓰면 수명은 늘어난다</text>
</svg>
