<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <style>
    .title{font-size:20px;font-weight:700;fill:#222}
    .v{font-size:14px;font-weight:700;fill:#fff;text-anchor:middle}
    .sub{font-size:13px;fill:#555}
    .lbl{font-size:13px;fill:#333}
  </style>
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" class="title">능동 밸런싱 — 높은 셀에서 낮은 셀로 전하를 옮긴다</text>
  <defs>
    <marker id="big" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 Z" fill="#7FB069"/></marker>
  </defs>
  <rect x="90" y="110" width="150" height="120" rx="8" fill="#E8645A"/>
  <text x="165" y="160" class="v" font-size="16">셀 A (높음)</text>
  <text x="165" y="186" class="v">4.10 V</text>
  <text x="165" y="252" text-anchor="middle" class="sub">에너지 내보냄</text>
  <rect x="300" y="125" width="160" height="90" rx="8" fill="#f4f7fb" stroke="#5a8a9e" stroke-width="2"/>
  <text x="380" y="158" text-anchor="middle" class="lbl" font-weight="700">전하 이동 회로</text>
  <text x="380" y="182" text-anchor="middle" class="sub" font-size="12">커패시터 / 인덕터 /</text>
  <text x="380" y="200" text-anchor="middle" class="sub" font-size="12">트랜스포머 방식</text>
  <line x1="240" y1="170" x2="300" y2="170" stroke="#7FB069" stroke-width="4" marker-end="url(#big)"/>
  <line x1="460" y1="170" x2="520" y2="170" stroke="#7FB069" stroke-width="4" marker-end="url(#big)"/>
  <rect x="520" y="110" width="150" height="120" rx="8" fill="#4A7BC8"/>
  <text x="595" y="160" class="v" font-size="16">셀 B (낮음)</text>
  <text x="595" y="186" class="v">3.80 V</text>
  <text x="595" y="252" text-anchor="middle" class="sub">에너지 받음</text>
  <rect x="90" y="290" width="580" height="80" rx="8" fill="#f0f7ee" stroke="#a8c79a" stroke-width="1.5"/>
  <text x="110" y="318" class="lbl" font-weight="700" fill="#3b6a28">수동과 다른 점</text>
  <text x="110" y="342" class="sub" font-size="13">· 에너지를 버리지 않고 옮긴다 → 효율 높고 빠르다</text>
  <text x="110" y="362" class="sub" font-size="13">· 대신 회로가 복잡하고 비싸다. 큰 용량·고가 시스템(EV 등)에서 주로 쓴다</text>
</svg>