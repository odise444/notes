<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <style>
    .title{font-size:20px;font-weight:700;fill:#222}
    .lbl{font-size:13px;fill:#333}
    .sub{font-size:12px;fill:#666}
    .node{font-size:13px;font-weight:700;fill:#fff;text-anchor:middle}
  </style>
  <rect width="760" height="380" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" class="title">CAN 버스 — 2선 위에 모두가 매달린다</text>
  <line x1="120" y1="150" x2="660" y2="150" stroke="#4A7BC8" stroke-width="3"/>
  <line x1="120" y1="195" x2="660" y2="195" stroke="#E8645A" stroke-width="3"/>
  <text x="100" y="155" text-anchor="end" class="lbl" fill="#4A7BC8" font-weight="700">CAN_H</text>
  <text x="100" y="200" text-anchor="end" class="lbl" fill="#b5593f" font-weight="700">CAN_L</text>
  <rect x="112" y="160" width="16" height="25" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="150" x2="120" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="185" x2="120" y2="195" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="230" text-anchor="middle" class="sub" fill="#333" font-weight="700">120Ω</text>
  <rect x="652" y="160" width="16" height="25" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <line x1="660" y1="150" x2="660" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="660" y1="185" x2="660" y2="195" stroke="#333" stroke-width="1.5"/>
  <text x="660" y="230" text-anchor="middle" class="sub" fill="#333" font-weight="700">120Ω</text>
  <g>
    <rect x="170" y="70" width="80" height="44" rx="6" fill="#3b5a82"/>
    <text x="210" y="97" class="node">BMS</text>
    <line x1="195" y1="114" x2="195" y2="150" stroke="#333" stroke-width="1.5"/>
    <line x1="225" y1="114" x2="225" y2="195" stroke="#333" stroke-width="1.5"/>
    <circle cx="195" cy="150" r="3" fill="#4A7BC8"/><circle cx="225" cy="195" r="3" fill="#E8645A"/>
  </g>
  <g>
    <rect x="320" y="70" width="90" height="44" rx="6" fill="#5a8a9e"/>
    <text x="365" y="97" class="node">충전기</text>
    <line x1="350" y1="114" x2="350" y2="150" stroke="#333" stroke-width="1.5"/>
    <line x1="380" y1="114" x2="380" y2="195" stroke="#333" stroke-width="1.5"/>
    <circle cx="350" cy="150" r="3" fill="#4A7BC8"/><circle cx="380" cy="195" r="3" fill="#E8645A"/>
  </g>
  <g>
    <rect x="300" y="240" width="90" height="44" rx="6" fill="#7FB069"/>
    <text x="345" y="267" class="node">디스플레이</text>
    <line x1="330" y1="240" x2="330" y2="150" stroke="#333" stroke-width="1.5"/>
    <line x1="360" y1="240" x2="360" y2="195" stroke="#333" stroke-width="1.5"/>
    <circle cx="330" cy="150" r="3" fill="#4A7BC8"/><circle cx="360" cy="195" r="3" fill="#E8645A"/>
  </g>
  <g>
    <rect x="470" y="240" width="90" height="44" rx="6" fill="#9b6fb0"/>
    <text x="515" y="267" class="node">제어기</text>
    <line x1="500" y1="240" x2="500" y2="150" stroke="#333" stroke-width="1.5"/>
    <line x1="530" y1="240" x2="530" y2="195" stroke="#333" stroke-width="1.5"/>
    <circle cx="500" cy="150" r="3" fill="#4A7BC8"/><circle cx="530" cy="195" r="3" fill="#E8645A"/>
  </g>
  <text x="380" y="330" text-anchor="middle" class="sub" font-size="13">모든 노드가 같은 2선(CAN_H·CAN_L)을 공유한다. 양 끝에 120Ω 종단저항이 반드시 들어간다.</text>
  <text x="380" y="354" text-anchor="middle" class="sub" font-size="13">주소(슬레이브 선택)가 아니라 메시지 ID로 통신하는 멀티마스터 방식이다.</text>
</svg>