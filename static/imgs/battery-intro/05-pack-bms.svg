<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <style>
    .title{font-size:20px;font-weight:700;fill:#222}
    .bx{font-size:14px;font-weight:700;fill:#fff}
    .lbl{font-size:13px;fill:#333}
    .sub{font-size:12px;fill:#666}
  </style>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="34" text-anchor="middle" class="title">셀 → 모듈 → 팩, 그리고 BMS</text>

  <!-- hierarchy row -->
  <defs>
    <marker id="a2" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>
  <g>
    <rect x="40" y="70" width="90" height="60" rx="6" fill="#4A7BC8"/>
    <text x="85" y="100" text-anchor="middle" class="bx">셀</text>
    <text x="85" y="118" text-anchor="middle" class="bx" font-size="11" font-weight="400">Cell</text>

    <line x1="135" y1="100" x2="175" y2="100" stroke="#555" stroke-width="2.5" marker-end="url(#a2)"/>

    <rect x="180" y="65" width="110" height="70" rx="6" fill="#5a8a9e"/>
    <text x="235" y="98" text-anchor="middle" class="bx">모듈</text>
    <text x="235" y="117" text-anchor="middle" class="bx" font-size="11" font-weight="400">Module</text>

    <line x1="295" y1="100" x2="335" y2="100" stroke="#555" stroke-width="2.5" marker-end="url(#a2)"/>

    <rect x="340" y="58" width="140" height="84" rx="6" fill="#3b5a82"/>
    <text x="410" y="95" text-anchor="middle" class="bx">팩</text>
    <text x="410" y="115" text-anchor="middle" class="bx" font-size="11" font-weight="400">Pack (+BMS·냉각·기구)</text>
  </g>
  <text x="260" y="165" text-anchor="middle" class="sub">셀을 묶어 모듈, 모듈을 묶어 팩이 된다</text>

  <!-- BMS block diagram -->
  <text x="360" y="205" text-anchor="middle" class="title" font-size="17">BMS — 배터리의 두뇌</text>

  <!-- central BMS -->
  <rect x="290" y="290" width="140" height="70" rx="8" fill="#E8645A"/>
  <text x="360" y="322" text-anchor="middle" class="bx" font-size="16">BMS</text>
  <text x="360" y="343" text-anchor="middle" class="bx" font-size="11" font-weight="400">감시·밸런싱·보호·추정</text>

  <!-- surrounding nodes -->
  <g class="lbl" text-anchor="middle">
    <!-- cells (top-left) -->
    <rect x="60" y="240" width="150" height="44" rx="6" fill="#F4F7FB" stroke="#9bb3cc" stroke-width="1.5"/>
    <text x="135" y="262" class="lbl" font-weight="700">셀 스택</text>
    <text x="135" y="278" class="sub">전압·온도 측정</text>

    <!-- current sensor (bottom-left) -->
    <rect x="60" y="360" width="150" height="44" rx="6" fill="#F4F7FB" stroke="#9bb3cc" stroke-width="1.5"/>
    <text x="135" y="382" class="lbl" font-weight="700">전류 센서</text>
    <text x="135" y="398" class="sub">충방전 전류</text>

    <!-- protection (top-right) -->
    <rect x="510" y="240" width="150" height="44" rx="6" fill="#F4F7FB" stroke="#9bb3cc" stroke-width="1.5"/>
    <text x="585" y="262" class="lbl" font-weight="700">보호 회로</text>
    <text x="585" y="278" class="sub">MOSFET·릴레이 차단</text>

    <!-- CAN (bottom-right) -->
    <rect x="510" y="360" width="150" height="44" rx="6" fill="#F4F7FB" stroke="#9bb3cc" stroke-width="1.5"/>
    <text x="585" y="382" class="lbl" font-weight="700">CAN 통신</text>
    <text x="585" y="398" class="sub">상위 제어기로</text>
  </g>

  <!-- connectors -->
  <line x1="210" y1="262" x2="290" y2="305" stroke="#888" stroke-width="2"/>
  <line x1="210" y1="382" x2="290" y2="345" stroke="#888" stroke-width="2"/>
  <line x1="510" y1="262" x2="430" y2="305" stroke="#888" stroke-width="2"/>
  <line x1="510" y1="382" x2="430" y2="345" stroke="#888" stroke-width="2"/>
</svg>
