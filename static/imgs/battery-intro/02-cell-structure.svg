<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <style>
    .title{font-size:20px;font-weight:700;fill:#222}
    .lbl{font-size:14px;fill:#fff;font-weight:700}
    .lbl2{font-size:13px;fill:#333}
    .sub{font-size:12px;fill:#666}
  </style>
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="36" text-anchor="middle" class="title">셀 단면 구조</text>

  <!-- layers -->
  <!-- Cu collector -->
  <rect x="90" y="70" width="55" height="200" fill="#C9802E"/>
  <text x="117" y="175" text-anchor="middle" class="lbl" transform="rotate(-90 117 175)">집전체 Cu</text>
  <!-- anode -->
  <rect x="145" y="70" width="110" height="200" fill="#4A7BC8"/>
  <text x="200" y="170" text-anchor="middle" class="lbl">음극 (흑연)</text>
  <text x="200" y="190" text-anchor="middle" class="lbl" font-size="12" font-weight="400">Anode</text>
  <!-- separator -->
  <rect x="255" y="70" width="40" height="200" fill="#cfd8e3"/>
  <text x="275" y="175" text-anchor="middle" class="lbl2" transform="rotate(-90 275 175)" font-weight="700">분리막</text>
  <!-- cathode -->
  <rect x="295" y="70" width="110" height="200" fill="#E8645A"/>
  <text x="350" y="170" text-anchor="middle" class="lbl">양극</text>
  <text x="350" y="190" text-anchor="middle" class="lbl" font-size="12" font-weight="400">Cathode</text>
  <!-- Al collector -->
  <rect x="405" y="70" width="55" height="200" fill="#9AA0A6"/>
  <text x="432" y="175" text-anchor="middle" class="lbl" transform="rotate(-90 432 175)">집전체 Al</text>

  <!-- electrolyte note (fills gaps) -->
  <text x="275" y="300" text-anchor="middle" class="sub">※ 전해질이 전체에 스며들어 이온이 이동</text>

  <!-- right legend -->
  <g font-size="14">
    <rect x="510" y="80" width="18" height="18" fill="#4A7BC8"/>
    <text x="536" y="94" class="lbl2">음극재 — 충전 시 Li 저장</text>
    <rect x="510" y="115" width="18" height="18" fill="#E8645A"/>
    <text x="536" y="129" class="lbl2">양극재 — 성능·전압 결정</text>
    <rect x="510" y="150" width="18" height="18" fill="#cfd8e3"/>
    <text x="536" y="164" class="lbl2">분리막 — 단락 방지·이온 통과</text>
    <rect x="510" y="185" width="18" height="18" fill="#C9802E"/>
    <text x="536" y="199" class="lbl2">Cu 집전체 (음극)</text>
    <rect x="510" y="220" width="18" height="18" fill="#9AA0A6"/>
    <text x="536" y="234" class="lbl2">Al 집전체 (양극)</text>
  </g>
</svg>
