<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <style>
    .title{font-size:20px;font-weight:700;fill:#222}
    .name{font-size:16px;font-weight:700;fill:#222}
    .sub{font-size:12px;fill:#666}
  </style>
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="36" text-anchor="middle" class="title">셀의 3가지 형태</text>

  <!-- Cylindrical -->
  <g transform="translate(60,70)">
    <ellipse cx="70" cy="20" rx="40" ry="14" fill="#6c8ebf" stroke="#3b5a82" stroke-width="2"/>
    <rect x="30" y="20" width="80" height="130" fill="#7ea0d0" stroke="#3b5a82" stroke-width="2"/>
    <ellipse cx="70" cy="150" rx="40" ry="14" fill="#6c8ebf" stroke="#3b5a82" stroke-width="2"/>
    <rect x="58" y="6" width="24" height="10" rx="3" fill="#3b5a82"/>
    <text x="70" y="190" text-anchor="middle" class="name">원통형</text>
    <text x="70" y="210" text-anchor="middle" class="sub">18650 · 21700 · 4680</text>
    <text x="70" y="232" text-anchor="middle" class="sub">튼튼·양산성·방열 ○</text>
  </g>

  <!-- Prismatic -->
  <g transform="translate(290,70)">
    <rect x="20" y="20" width="120" height="130" rx="6" fill="#e69b8a" stroke="#b5593f" stroke-width="2"/>
    <rect x="40" y="8" width="20" height="14" rx="3" fill="#b5593f"/>
    <rect x="100" y="8" width="20" height="14" rx="3" fill="#b5593f"/>
    <text x="80" y="190" text-anchor="middle" class="name">각형</text>
    <text x="80" y="210" text-anchor="middle" class="sub">Prismatic (금속 캔)</text>
    <text x="80" y="232" text-anchor="middle" class="sub">공간효율·적층 ○ (EV·ESS)</text>
  </g>

  <!-- Pouch -->
  <g transform="translate(520,70)">
    <rect x="20" y="30" width="120" height="110" rx="4" fill="#a8d5a0" stroke="#5a8a3c" stroke-width="2"/>
    <rect x="40" y="18" width="22" height="14" fill="#5a8a3c"/>
    <rect x="98" y="18" width="22" height="14" fill="#5a8a3c"/>
    <line x1="20" y1="42" x2="140" y2="42" stroke="#5a8a3c" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="128" x2="140" y2="128" stroke="#5a8a3c" stroke-width="1" opacity="0.5"/>
    <text x="80" y="190" text-anchor="middle" class="name">파우치</text>
    <text x="80" y="210" text-anchor="middle" class="sub">Pouch (필름 포장)</text>
    <text x="80" y="232" text-anchor="middle" class="sub">가볍고 형상 자유 ○</text>
  </g>

  <text x="360" y="300" text-anchor="middle" class="sub">선택은 방열 · 기계강도 · 공간효율의 트레이드오프</text>
</svg>
