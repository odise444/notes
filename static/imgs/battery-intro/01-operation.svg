<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <style>
    .title{font-size:20px;font-weight:700;fill:#222}
    .lbl{font-size:15px;fill:#333}
    .sub{font-size:13px;fill:#666}
    .tag{font-size:13px;font-weight:700;fill:#fff}
  </style>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="34" text-anchor="middle" class="title">배터리 동작 원리 (방전)</text>

  <!-- external circuit path -->
  <path d="M 150 130 V 80 H 570 V 130" fill="none" stroke="#444" stroke-width="3"/>
  <!-- load (motor) -->
  <circle cx="360" cy="80" r="26" fill="#fff" stroke="#444" stroke-width="3"/>
  <text x="360" y="86" text-anchor="middle" class="lbl" font-weight="700">M</text>
  <text x="360" y="55" text-anchor="middle" class="sub">모터 · 전구 (부하)</text>

  <!-- electron flow arrows on top wire -->
  <text x="250" y="72" text-anchor="middle" font-size="13" fill="#C0392B" font-weight="700">← e⁻ 전자</text>
  <text x="475" y="72" text-anchor="middle" font-size="13" fill="#C0392B" font-weight="700">← e⁻</text>

  <!-- cell body -->
  <rect x="120" y="130" width="480" height="220" rx="10" fill="#F4F7FB" stroke="#9bb3cc" stroke-width="2"/>

  <!-- anode (left) -->
  <rect x="135" y="150" width="90" height="180" rx="6" fill="#4A7BC8"/>
  <text x="180" y="200" text-anchor="middle" class="tag">음극</text>
  <text x="180" y="220" text-anchor="middle" class="tag" font-size="11" font-weight="400">(Anode)</text>
  <text x="180" y="350" text-anchor="middle" class="sub">흑연</text>

  <!-- separator -->
  <rect x="350" y="150" width="20" height="180" fill="#cfd8e3"/>
  <text x="360" y="372" text-anchor="middle" class="sub">분리막</text>

  <!-- cathode (right) -->
  <rect x="495" y="150" width="90" height="180" rx="6" fill="#E8645A"/>
  <text x="540" y="200" text-anchor="middle" class="tag">양극</text>
  <text x="540" y="220" text-anchor="middle" class="tag" font-size="11" font-weight="400">(Cathode)</text>
  <text x="540" y="350" text-anchor="middle" class="sub">LFP · NMC 등</text>

  <!-- electrolyte label -->
  <text x="290" y="172" text-anchor="middle" class="sub">전해질 (이온 통로)</text>

  <!-- Li+ ions moving inside: anode -> cathode -->
  <g>
    <circle cx="260" cy="250" r="13" fill="#7FB069"/>
    <text x="260" y="255" text-anchor="middle" class="tag" font-size="11">Li⁺</text>
    <circle cx="320" cy="290" r="13" fill="#7FB069"/>
    <text x="320" y="295" text-anchor="middle" class="tag" font-size="11">Li⁺</text>
    <circle cx="410" cy="245" r="13" fill="#7FB069"/>
    <text x="410" y="250" text-anchor="middle" class="tag" font-size="11">Li⁺</text>
  </g>
  <!-- arrow inside electrolyte -->
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5a8a3c"/>
    </marker>
  </defs>
  <line x1="240" y1="310" x2="470" y2="310" stroke="#5a8a3c" stroke-width="2.5" marker-end="url(#ar)" stroke-dasharray="6 5"/>
  <text x="355" y="332" text-anchor="middle" font-size="13" fill="#5a8a3c" font-weight="700">Li⁺ 이온 →</text>

  <!-- caption -->
  <text x="360" y="406" text-anchor="middle" class="sub">전자(e⁻)는 바깥 회로로, 이온(Li⁺)은 안쪽 전해질로 — 짝을 이뤄 흐른다</text>
</svg>
